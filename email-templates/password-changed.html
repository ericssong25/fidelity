<!--
  Subject: Tu contraseña de Zuma ha sido actualizada
-->

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#F4F3FB;font-family:'Segoe UI',system-ui,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F4F3FB;padding:40px 0">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(18,23,59,0.06)">
          
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#12173B,#7546ED);padding:36px 32px;text-align:center">
              <table cellpadding="0" cellspacing="0" align="center">
                <tr>
                  <td style="width:48px;height:48px;background:rgba(255,255,255,0.12);border-radius:12px;text-align:center">
                    <span style="color:white;font-size:24px;font-weight:800;line-height:48px">Z</span>
                  </td>
                </tr>
              </table>
              <p style="color:white;font-size:22px;font-weight:800;margin:16px 0 0;letter-spacing:-0.3px">Contraseña actualizada</p>
              <p style="color:rgba(255,255,255,0.6);font-size:14px;margin:6px 0 0">Zuma — Tu programa de lealtad</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px;text-align:center">
              <p style="color:#12173B;font-size:15px;margin:0 0 16px;line-height:1.6">Hola,</p>
              <p style="color:#12173B;font-size:15px;margin:0 0 24px;line-height:1.6;text-align:center">
                La contraseña de tu cuenta en Zuma<br>
                fue actualizada exitosamente.
              </p>

              <div style="background:#F4F3FB;border-radius:12px;padding:18px 20px;margin:0 0 24px;text-align:center">
                <p style="color:#B1A9E5;font-size:12px;margin:0 0 4px">Cuenta</p>
                <p style="color:#12173B;font-size:15px;font-weight:700;margin:0">{{ .Email }}</p>
              </div>

              <div style="background:#F4F3FB;border-left:3px solid #FF6B6B;border-radius:0 8px 8px 0;padding:14px 16px;margin:0 0 24px;text-align:left">
                <p style="color:#12173B;font-size:12px;margin:0;line-height:1.5">
                  <strong style="color:#FF6B6B">¿No realizaste este cambio?</strong> Si no fuiste tú, restablece tu contraseña de inmediato desde la app para proteger tu cuenta.
                </p>
              </div>

              <hr style="border:none;border-top:1px solid rgba(177,169,229,0.15);margin:0 0 16px">
              <p style="color:#B1A9E5;font-size:11px;margin:0;text-align:center">Zuma · {{ .SiteURL }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
